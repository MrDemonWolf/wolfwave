# Crash-class SwiftLint rules — BLOCKING gate.
#
# Scoped to ONLY the three rules whose violations turn into hard runtime crashes:
# a force-unwrap of nil, a `try!` on a throwing call, or a force `as!` cast. The
# main `.swiftlint.yml` stays lenient (warnings, `continue-on-error: true`) while
# the codebase ramps up on style; these three stay enforced at error severity. The
# CI `lint-crash-safety` job runs this config with `--strict` and no
# `continue-on-error`, so a regression fails the PR.
#
# Lives at the repo root next to `.swiftlint.yml` so `included` paths resolve the
# same way. Run locally with `make lint-crash-safety`.

# Scoped to PRODUCTION source only. The goal is "never ship a crash", so the gate
# guards the app target. Test files are intentionally excluded: a force-unwrap in
# a test fixture (`URL(string: "…")!`) is idiomatic and a test crash is a failed
# test, not a shipped crash. The lenient main `.swiftlint.yml` still lints the
# tests for everything else.
included:
  - apps/native/WolfWave

excluded:
  # Generated by design-system/scripts/generate.ts — never hand-edited.
  - apps/native/WolfWave/Core/DesignSystem/Tokens.generated.swift

# `only_rules` is the definitive list: exactly these run, regardless of whether
# they are opt-in (force_unwrapping) or default (force_try, force_cast).
only_rules:
  - force_unwrapping
  - force_try
  - force_cast

force_unwrapping:
  severity: error
force_try:
  severity: error
force_cast:
  severity: error

reporter: "xcode"
