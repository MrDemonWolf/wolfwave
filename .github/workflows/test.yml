name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: WolfWave
  PROJECT: apps/native/WolfWave.xcodeproj

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Detect native changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            native:
              - 'apps/native/**'
              - 'apps/widget/**'
              - 'design-system/tokens.json'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - 'Makefile'

      - name: Skip notice (docs/marketing only)
        if: steps.filter.outputs.native != 'true'
        run: echo "No native changes detected; skipping Swift build & test."

      - name: Install Bun
        if: steps.filter.outputs.native == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache bun dependencies
        if: steps.filter.outputs.native == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install JS dependencies
        if: steps.filter.outputs.native == 'true'
        run: bun install --frozen-lockfile

      - name: Build OBS widget
        if: steps.filter.outputs.native == 'true'
        run: bun run --filter widget build

      - name: Verify widget.html is in sync with apps/widget/ sources
        if: steps.filter.outputs.native == 'true'
        run: |
          if ! git diff --exit-code -- apps/native/WolfWave/Resources/widget.html; then
            echo "::error::widget.html is out of sync with apps/widget/ sources. Run \`make widget\` (or \`bun run --filter widget build\`) and commit the result."
            exit 1
          fi

      - name: Verify design tokens are in sync with tokens.json
        if: steps.filter.outputs.native == 'true'
        run: |
          bun run tokens
          if ! git diff --exit-code -- \
            apps/native/WolfWave/Core/DesignSystem/Tokens.generated.swift \
            apps/docs/app/tokens.generated.css \
            apps/native/WolfWave/Resources/widget-tokens.generated.js \
            apps/marketing/shared/tokens.generated.ts \
            'apps/docs/app/(home)/_widgets/widget-themes.generated.ts'; then
            echo "::error::Generated design tokens are out of sync with design-system/tokens.json. Run \`bun run tokens\` and commit the result."
            exit 1
          fi

      - name: Create Config.xcconfig
        if: steps.filter.outputs.native == 'true'
        run: |
          printf 'TWITCH_CLIENT_ID = placeholder\nDISCORD_CLIENT_ID = placeholder\nGITHUB_REPO_OWNER = mrdemonwolf\nGITHUB_REPO_NAME = wolfwave\nDOCS_URL = https://mrdemonwolf.github.io/wolfwave\nCOMMUNITY_DISCORD_URL = https://mrdwolf.net/discord\nCOPYRIGHT_HOLDER = MrDemonWolf, Inc.\n' \
            > apps/native/WolfWave/Config.xcconfig

      - name: Verify SponsorConfig.generated.swift is in sync with FUNDING.yml
        if: steps.filter.outputs.native == 'true'
        run: |
          bash scripts/generate-sponsor-config.sh
          if ! git diff --exit-code -- apps/native/WolfWave/Core/SponsorConfig.generated.swift; then
            echo "::error::SponsorConfig.generated.swift is out of sync with .github/FUNDING.yml. Run \`make sponsor-config\` and commit the result."
            exit 1
          fi

      - name: Cache SwiftPM packages
        if: steps.filter.outputs.native == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('apps/native/WolfWave.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build & Test
        if: steps.filter.outputs.native == 'true'
        env:
          # Disable the nano malloc zone in the test host. The Swift
          # runtime + nano allocator on the macos-26 runner image
          # historically aborted the xctest host with
          # `malloc: pointer being freed was not allocated` at process
          # launch. That runner bug is resolved, but MallocNanoZone=0 is
          # kept as cheap insurance against a regression.
          MallocNanoZone: "0"
          # Silence routine OSLog chatter (debug/info/warn) for the test
          # run so the captured xcodebuild output isn't flooded with
          # thousands of log lines per suite. Errors still surface. The
          # file sink is untouched, so LoggerTests / LoggerClearTests
          # keep asserting on on-disk content. Logger.swift also
          # auto-detects XCTest; this just pins the level explicitly.
          WOLFWAVE_LOG_LEVEL: error
        run: |
          # Full suite runs unskipped. SongRequestCommandTests and
          # TrackInfoCommandTests were previously -skip-testing'd because
          # the macos-26 runner image aborted the xctest host with a
          # malloc nano-zone crash; that runner bug is resolved (verified
          # 2026-07-15: full suite green on macos-26, both classes pass).
          # MallocNanoZone=0 + serial testing are kept as cheap insurance.
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            ARCHS="arm64" \
            -configuration Debug test \
            -clonedSourcePackagesDirPath SourcePackages \
            -parallel-testing-enabled NO \
            -disable-concurrent-destination-testing \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload Test Results
        if: always() && steps.filter.outputs.native == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: TestResults
          path: TestResults.xcresult

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect docs changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            docs:
              - 'apps/docs/**'
              - 'design-system/tokens.json'
              - 'design-system/scripts/generate.ts'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'

      - name: Skip notice (no docs changes)
        if: steps.filter.outputs.docs != 'true'
        run: echo "No docs changes detected; skipping docs build & checks."

      - name: Install Bun
        if: steps.filter.outputs.docs == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache bun dependencies
        if: steps.filter.outputs.docs == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install deps
        if: steps.filter.outputs.docs == 'true'
        run: bun install --frozen-lockfile

      - name: Type check
        if: steps.filter.outputs.docs == 'true'
        run: bun run --filter docs types:check

      - name: Lint
        if: steps.filter.outputs.docs == 'true'
        run: bun run --filter docs lint

      - name: Build docs
        if: steps.filter.outputs.docs == 'true'
        run: bunx turbo build --filter docs

  lint:
    name: SwiftLint
    # Runs on Linux via the official SwiftLint container; no need to burn a
    # 10x-billed macOS runner just to lint. SwiftLint is platform-agnostic.
    runs-on: ubuntu-latest
    # BLOCKING. Only NEW violations fail: the committed swiftlint-baseline.json
    # grandfathers the existing legacy violations, and the baseline is a ratchet
    # that only ever shrinks (regenerate with `make lint-baseline`). The image
    # tag is PINNED to match the swiftlint used to write the baseline — a moving
    # `:latest` could add rules and report grandfathered code as new.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Detect native changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            native:
              - 'apps/native/**'
              - '.swiftlint.yml'
              - 'swiftlint-baseline.json'

      - name: Run SwiftLint
        if: steps.filter.outputs.native == 'true'
        run: |
          docker run --rm -v "$PWD:/work" -w /work ghcr.io/realm/swiftlint:0.65.0 \
            swiftlint lint --config .swiftlint.yml --baseline swiftlint-baseline.json --reporter github-actions-logging

  lint-crash-safety:
    name: SwiftLint (crash-safety, blocking)
    # BLOCKING gate for the three crash-class rules (force unwrap / try! / as!)
    # on production source. Unlike the lenient `lint` job above, this has no
    # `continue-on-error` and runs with `--strict`, so a regression fails the PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Detect native changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            native:
              - 'apps/native/**'
              - '.swiftlint-crash-safety.yml'

      - name: Run crash-safety SwiftLint
        if: steps.filter.outputs.native == 'true'
        run: |
          docker run --rm -v "$PWD:/work" -w /work ghcr.io/realm/swiftlint:0.65.0 \
            swiftlint lint --strict --config .swiftlint-crash-safety.yml --reporter github-actions-logging

  lint-headers:
    name: Swift file headers (blocking)
    # BLOCKING gate that every Swift file carries the canonical Xcode header
    # from IDETemplateMacros.plist, with a Created-by date matching the file's
    # git creation date.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the check resolves each file's creation date with
          # `git log --diff-filter=A --follow`, which a shallow clone can't
          # answer. The script degrades to a shape-only check when it detects
          # one, so a shallow checkout here would silently weaken the gate.
          fetch-depth: 0
          persist-credentials: false

      - name: Detect native changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            native:
              - 'apps/native/**'
              - 'scripts/check-headers.mjs'

      - name: Check Swift file headers
        if: steps.filter.outputs.native == 'true'
        run: node scripts/check-headers.mjs

  ds-lint:
    name: Design-system lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect view or lint changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            ds:
              - 'apps/native/WolfWave/Views/**'
              - 'design-system/scripts/lint.ts'
              - 'design-system/lint-allowlist.txt'

      - name: Install Bun
        if: steps.filter.outputs.ds == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Run design-system lint
        if: steps.filter.outputs.ds == 'true'
        run: bun run ds:lint
