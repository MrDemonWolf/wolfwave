name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip GitHub Release creation (build only)'
        required: false
        default: 'false'

env:
  SCHEME: WolfWave
  PROJECT: apps/native/wolfwave.xcodeproj
  CONFIGURATION: Release

jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create Config.xcconfig
        run: |
          printf 'TWITCH_CLIENT_ID = %s\nDISCORD_CLIENT_ID = %s\n' \
            "${{ secrets.TWITCH_CLIENT_ID }}" \
            "${{ secrets.DISCORD_CLIENT_ID }}" \
            > apps/native/wolfwave/Config.xcconfig

      - name: Run Tests
        run: |
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -destination 'platform=macOS,arch=arm64' \
            -configuration Debug test \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath ReleaseTestResults.xcresult

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ReleaseTestResults
          path: ReleaseTestResults.xcresult

  create-draft-release:
    needs: test
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── Create Config.xcconfig from secrets ───────────────────────────
      - name: Create Config.xcconfig
        run: |
          printf 'TWITCH_CLIENT_ID = %s\nDISCORD_CLIENT_ID = %s\n' \
            "${{ secrets.TWITCH_CLIENT_ID }}" \
            "${{ secrets.DISCORD_CLIENT_ID }}" \
            > apps/native/wolfwave/Config.xcconfig

      # ── Resolve version from tag or project ───────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" -showBuildSettings 2>/dev/null \
              | awk -F'= ' '/MARKETING_VERSION/ {gsub(/^[ \t]+/,"",$2); print $2; exit}')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg_name=WolfWave-${VERSION}-arm64.dmg" >> "$GITHUB_OUTPUT"
          echo "📌 Version: $VERSION"

      # ── Import Developer ID certificate ──────────────────────────────
      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          # Decode certificate
          echo "$CERT_P12" | base64 --decode > "$CERT_PATH"

          # Create temporary keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Clean up certificate file
          rm -f "$CERT_PATH"
          echo "✅ Developer ID certificate imported"

      # ── Build Release ─────────────────────────────────────────────────
      - name: Build Release
        run: |
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build build -quiet

      # ── Locate .app ───────────────────────────────────────────────────
      - name: Locate .app bundle
        id: app
        run: |
          APP_PATH=$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" -derivedDataPath build \
            -showBuildSettings 2>/dev/null \
            | awk -F'= ' '/CONFIGURATION_BUILD_DIR/ {dir=$2} /WRAPPER_NAME/ {name=$2} END {gsub(/^[ \t]+/,"",dir); gsub(/^[ \t]+/,"",name); print dir "/" name}')
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ .app not found at $APP_PATH"
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "✅ App: $APP_PATH"

      # ── Code sign .app ──────────────────────────────────────────────
      - name: Code sign .app bundle
        env:
          APP_PATH: ${{ steps.app.outputs.path }}
        run: |
          codesign --deep --force --verify --verbose \
            --sign "Developer ID Application" \
            --options runtime \
            --timestamp \
            "$APP_PATH"
          echo "✅ App signed"

      # ── Create DMG ────────────────────────────────────────────────────
      - name: Create DMG
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
          APP_PATH: ${{ steps.app.outputs.path }}
        run: |
          mkdir -p builds/staging
          cp -R "$APP_PATH" builds/staging/
          ln -sf /Applications builds/staging/Applications

          hdiutil create -srcfolder builds/staging \
            -volname "WolfWave" -fs HFS+ -format UDRW -ov \
            builds/_tmp.dmg >/dev/null

          MOUNTPOINT=$(hdiutil attach -readwrite -noverify -noautoopen \
            builds/_tmp.dmg | sed -n 's|.*\(/Volumes/.*\)|\1|p')
          sleep 1

          osascript \
            -e 'tell application "Finder"' \
            -e '  tell disk "WolfWave"' \
            -e '    open' \
            -e '    set current view of container window to icon view' \
            -e '    set toolbar visible of container window to false' \
            -e '    set statusbar visible of container window to false' \
            -e '    set the bounds of container window to {200, 200, 740, 520}' \
            -e '    set viewOptions to the icon view options of container window' \
            -e '    set arrangement of viewOptions to not arranged' \
            -e '    set icon size of viewOptions to 100' \
            -e '    set text size of viewOptions to 12' \
            -e '    set position of item "WolfWave.app" of container window to {140, 160}' \
            -e '    set position of item "Applications" of container window to {400, 160}' \
            -e '    close' \
            -e '    open' \
            -e '    delay 1' \
            -e '  end tell' \
            -e 'end tell' 2>/dev/null || true

          sync; sleep 1
          hdiutil detach "$MOUNTPOINT" -quiet 2>/dev/null || true
          sleep 1

          hdiutil convert builds/_tmp.dmg -format UDZO \
            -imagekey zlib-level=9 -o "builds/$DMG_NAME" >/dev/null
          rm -f builds/_tmp.dmg
          rm -rf builds/staging

          echo "✅ DMG: builds/$DMG_NAME"

      # ── Sign DMG ───────────────────────────────────────────────────────
      - name: Sign DMG
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "builds/$DMG_NAME"
          echo "✅ DMG signed"

      # ── Notarize DMG ────────────────────────────────────────────────
      - name: Notarize DMG
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "builds/$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --timeout 30m
          echo "✅ Notarization complete"

      # ── Staple notarization ticket ──────────────────────────────────
      - name: Staple notarization ticket
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
        run: |
          xcrun stapler staple "builds/$DMG_NAME"
          echo "✅ Notarization ticket stapled"

      # ── Generate Sparkle appcast ──────────────────────────────────────
      - name: Generate Sparkle appcast
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
          VERSION: ${{ steps.version.outputs.version }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Locate generate_appcast from the Sparkle package in DerivedData
          GENERATE_APPCAST=$(find build -name generate_appcast -type f 2>/dev/null | head -1)
          SIGN_UPDATE=$(find build -name sign_update -type f 2>/dev/null | head -1)
          if [ -z "$GENERATE_APPCAST" ]; then
            if [ -n "$SIGN_UPDATE" ]; then
              echo "⚠️ generate_appcast not found, using sign_update for Ed25519 signature"
              DMG_SIZE=$(stat -f%z "builds/$DMG_NAME")
              echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
              SIGNATURE=$("$SIGN_UPDATE" "builds/$DMG_NAME" --ed-key-file "$RUNNER_TEMP/sparkle_key" 2>/dev/null | grep -oE 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
              rm -f "$RUNNER_TEMP/sparkle_key"
              if [ -z "$SIGNATURE" ]; then
                echo "❌ Failed to generate Ed25519 signature"
                exit 1
              fi
              cat > builds/appcast.xml <<APPCAST
<?xml version="1.0" encoding="utf-8"?>
<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
  <channel>
    <title>WolfWave</title>
    <item>
      <title>WolfWave v${VERSION}</title>
      <sparkle:version>${VERSION}</sparkle:version>
      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
      <pubDate>$(date -R)</pubDate>
      <enclosure url="https://github.com/MrDemonWolf/wolfwave/releases/download/v${VERSION}/${DMG_NAME}"
        length="${DMG_SIZE}"
        type="application/octet-stream"
        sparkle:edSignature="${SIGNATURE}" />
    </item>
  </channel>
</rss>
APPCAST
            else
              echo "❌ Neither generate_appcast nor sign_update found in build artifacts"
              echo "Sparkle tools must be available after building. Check DerivedData."
              exit 1
            fi
          else
            echo "✅ Found generate_appcast at $GENERATE_APPCAST"
            # Use Sparkle's tool to generate a proper appcast
            echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
            "$GENERATE_APPCAST" \
              --ed-key-file "$RUNNER_TEMP/sparkle_key" \
              --download-url-prefix "https://github.com/MrDemonWolf/wolfwave/releases/download/v${VERSION}/" \
              -o builds/appcast.xml \
              builds/
            rm -f "$RUNNER_TEMP/sparkle_key"
          fi
          echo "✅ Appcast generated: builds/appcast.xml"

      # ── Upload DMG as artifact ─────────────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.version.outputs.dmg_name }}
          path: builds/${{ steps.version.outputs.dmg_name }}

      # ── Create draft GitHub Release ─────────────────────────────────
      - name: Create draft GitHub Release
        if: github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
        run: |
          # Delete existing draft release if re-running
          gh release delete "v$VERSION" --yes 2>/dev/null || true
          gh release create "v$VERSION" \
            "builds/$DMG_NAME" \
            "builds/appcast.xml" \
            --title "WolfWave v$VERSION" \
            --generate-notes \
            --draft

      # ── Cleanup ─────────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
