name: Build and deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/configure-pages@v4
        id: pages

      - name: Propagate base path (optional)
        run: echo "NEXT_PUBLIC_BASE_PATH=${{ steps.pages.outputs.base_url }}" >> "$GITHUB_ENV"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run build --filter docs

      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
