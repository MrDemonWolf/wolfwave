name: License Year

on:
  schedule:
    # January 1st at 12:00 AM CST (06:00 UTC)
    - cron: '0 6 1 1 *'
  workflow_dispatch:

jobs:
  update-year:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Update copyright year in LICENSE
        run: |
          CURRENT_YEAR=$(date +%Y)
          echo "CURRENT_YEAR=$CURRENT_YEAR" >> "$GITHUB_ENV"
          sed -i "s/Copyright (c) [0-9]\{4\}/Copyright (c) $CURRENT_YEAR/" LICENSE

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          commit-message: "chore: update license year to ${{ env.CURRENT_YEAR }}"
          title: "chore: update MIT license year to ${{ env.CURRENT_YEAR }}"
          body: "Automated annual update of the copyright year in the MIT license."
          branch: chore/update-license-year
          delete-branch: true
