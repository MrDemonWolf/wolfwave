name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Skip release creation
        type: boolean
        required: false
        default: false
  push:
    tags:
      - 'v*'

env:
  SCHEME: WolfWave
  PROJECT: apps/native/wolfwave.xcodeproj
  CONFIGURATION: Release

jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Config.xcconfig
        run: |
          printf 'TWITCH_CLIENT_ID = %s\nDISCORD_CLIENT_ID = %s\n' \
            "${{ secrets.TWITCH_CLIENT_ID }}" \
            "${{ secrets.DISCORD_CLIENT_ID }}" \
            > apps/native/wolfwave/Config.xcconfig

      - name: Run Tests
        run: |
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            ARCHS="arm64 x86_64" \
            -configuration Debug test \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath ReleaseTestResults.xcresult

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ReleaseTestResults
          path: ReleaseTestResults.xcresult

  build-and-release:
    needs: test
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Config.xcconfig
        run: |
          printf 'TWITCH_CLIENT_ID = %s\nDISCORD_CLIENT_ID = %s\n' \
            "${{ secrets.TWITCH_CLIENT_ID }}" \
            "${{ secrets.DISCORD_CLIENT_ID }}" \
            > apps/native/wolfwave/Config.xcconfig

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" -showBuildSettings 2>/dev/null \
              | awk -F'= ' '/MARKETING_VERSION/ {gsub(/^[ \t]+/,"",$2); print $2; exit}')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg_name=WolfWave-${VERSION}.dmg" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERT_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$CERT_PATH"
          echo "Developer ID certificate imported"

      - name: Build Release (Universal)
        run: |
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=macOS' \
            ARCHS="arm64 x86_64" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath build build -quiet

      - name: Locate app bundle
        id: app
        run: |
          APP_PATH=$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" -derivedDataPath build \
            -showBuildSettings 2>/dev/null \
            | awk -F'= ' '/CONFIGURATION_BUILD_DIR/ {dir=$2} /WRAPPER_NAME/ {name=$2} END {gsub(/^[ \t]+/,"",dir); gsub(/^[ \t]+/,"",name); print dir "/" name}')
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"; exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "App: $APP_PATH"

      - name: Code sign app bundle
        env:
          APP_PATH: ${{ steps.app.outputs.path }}
        run: |
          codesign --deep --force --verify --verbose \
            --sign "Developer ID Application" \
            --options runtime --timestamp "$APP_PATH"
          echo "App signed"

      - name: Create DMG
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
          APP_PATH: ${{ steps.app.outputs.path }}
        run: |
          mkdir -p builds/staging
          cp -R "$APP_PATH" builds/staging/
          ln -sf /Applications builds/staging/Applications
          hdiutil create -srcfolder builds/staging \
            -volname "WolfWave" -fs HFS+ -format UDRW -ov \
            builds/_tmp.dmg >/dev/null
          MOUNTPOINT=$(hdiutil attach -readwrite -noverify -noautoopen \
            builds/_tmp.dmg | sed -n 's|.*\(/Volumes/.*\)|\1|p')
          sleep 1
          osascript \
            -e 'tell application "Finder"' \
            -e '  tell disk "WolfWave"' \
            -e '    open' \
            -e '    set current view of container window to icon view' \
            -e '    set toolbar visible of container window to false' \
            -e '    set statusbar visible of container window to false' \
            -e '    set the bounds of container window to {200, 200, 740, 520}' \
            -e '    set viewOptions to the icon view options of container window' \
            -e '    set arrangement of viewOptions to not arranged' \
            -e '    set icon size of viewOptions to 100' \
            -e '    set text size of viewOptions to 12' \
            -e '    set position of item "WolfWave.app" of container window to {140, 160}' \
            -e '    set position of item "Applications" of container window to {400, 160}' \
            -e '    close' \
            -e '    open' \
            -e '    delay 1' \
            -e '  end tell' \
            -e 'end tell' 2>/dev/null || true
          sync; sleep 1
          hdiutil detach "$MOUNTPOINT" -quiet 2>/dev/null || true
          sleep 1
          hdiutil convert builds/_tmp.dmg -format UDZO \
            -imagekey zlib-level=9 -o "builds/$DMG_NAME" >/dev/null
          rm -f builds/_tmp.dmg && rm -rf builds/staging
          echo "DMG: builds/$DMG_NAME"

      - name: Sign DMG
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
        run: |
          codesign --sign "Developer ID Application" --timestamp "builds/$DMG_NAME"
          echo "DMG signed"

      - name: Notarize DMG
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "builds/$DMG_NAME" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait --timeout 30m
          echo "Notarization complete"

      - name: Staple notarization ticket
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
        run: |
          xcrun stapler staple "builds/$DMG_NAME"
          echo "Notarization ticket stapled"

      - name: Generate Sparkle appcast
        env:
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
          VERSION: ${{ steps.version.outputs.version }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          GENERATE_APPCAST=$(find build -name generate_appcast -type f 2>/dev/null | head -1)
          SIGN_UPDATE=$(find build -name sign_update -type f 2>/dev/null | head -1)
          if [ -n "$GENERATE_APPCAST" ]; then
            echo "Found generate_appcast at $GENERATE_APPCAST"
            echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
            "$GENERATE_APPCAST" \
              --ed-key-file "$RUNNER_TEMP/sparkle_key" \
              --download-url-prefix "https://github.com/MrDemonWolf/wolfwave/releases/download/v${VERSION}/" \
              -o builds/appcast.xml builds/
            rm -f "$RUNNER_TEMP/sparkle_key"
          elif [ -n "$SIGN_UPDATE" ]; then
            echo "Using sign_update for Ed25519 signature"
            echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
            SIGNATURE=$("$SIGN_UPDATE" "builds/$DMG_NAME" --ed-key-file "$RUNNER_TEMP/sparkle_key" 2>&1 | grep -oE 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
            rm -f "$RUNNER_TEMP/sparkle_key"
            if [ -z "$SIGNATURE" ]; then echo "Failed to sign"; exit 1; fi
            DMG_SIZE=$(stat -f%z "builds/$DMG_NAME")
            printf '<?xml version="1.0" encoding="utf-8"?>\n<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">\n  <channel>\n    <title>WolfWave</title>\n    <item>\n      <title>WolfWave v%s</title>\n      <sparkle:version>%s</sparkle:version>\n      <sparkle:shortVersionString>%s</sparkle:shortVersionString>\n      <pubDate>%s</pubDate>\n      <enclosure url="https://github.com/MrDemonWolf/wolfwave/releases/download/v%s/%s" length="%s" type="application/octet-stream" sparkle:edSignature="%s" />\n    </item>\n  </channel>\n</rss>\n' "$VERSION" "$VERSION" "$VERSION" "$(date -R)" "$VERSION" "$DMG_NAME" "$DMG_SIZE" "$SIGNATURE" > builds/appcast.xml
          else
            echo "Neither generate_appcast nor sign_update found"; exit 1
          fi
          echo "Appcast generated"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.dmg_name }}
          path: builds/${{ steps.version.outputs.dmg_name }}

      - name: Create draft GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG_NAME: ${{ steps.version.outputs.dmg_name }}
        run: |
          gh release delete "v$VERSION" --yes 2>/dev/null || true
          gh release create "v$VERSION" \
            "builds/$DMG_NAME" "builds/appcast.xml" \
            --title "WolfWave v$VERSION" \
            --generate-notes --draft

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
