name: Bug report
description: Report a bug in WolfWave
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below.

        Tip: you can pre-fill most of this from inside the app via **Settings → Advanced → Report a Bug**.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open WolfWave
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: false

  - type: input
    id: app-version
    attributes:
      label: App version
      description: WolfWave version (e.g. "1.2.0 (build 42)")
      placeholder: 1.2.0
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: macOS version
      description: e.g. "Version 14.0 (Build 23A344)"
      placeholder: macOS 26.0
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - DMG
        - Homebrew
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant log output here, or attach the exported log file.
        Export logs from Settings → Advanced → Export Logs.
      render: shell
    validations:
      required: false
