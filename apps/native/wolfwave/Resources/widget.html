<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WolfWave Widget</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<style>
/* Base reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Body */
body { width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

/* Root container */
#root { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 1rem; background: transparent; }

/* Widget show/hide transition */
#widget {
  width: 100%; overflow: hidden; position: relative;
  transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
              transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
              filter 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
#widget.hidden {
  opacity: 0;
  transform: translateY(12px) scale(0.97);
  filter: blur(2px);
}
#widget.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0px);
}

/* Blur layer */
.blur-layer {
  position: absolute; inset: 0; transform: scale(1.4);
  filter: blur(20px); opacity: 0.9;
  background-size: cover; background-position: center;
}

/* Noise texture */
.noise-layer {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 10;
  opacity: 0.04; border-radius: inherit;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 128px 128px;
}

/* Overlay layer */
.overlay-layer { position: absolute; inset: 0; }

/* Layout helpers */
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.items-center { align-items: center; }
.justify-center { justify-content: center; }
.h-full { height: 100%; }
.w-full { width: 100%; }
.relative { position: relative; }
.shrink-0 { flex-shrink: 0; }
.min-w-0 { min-width: 0; }
.flex-1 { flex: 1; }

/* Progress bar */
.progress-track {
  width: 100%; border-radius: 9999px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 9999px;
  transition: width 1s linear;
}
.time-row {
  display: flex; justify-content: space-between; margin-top: 2px;
}

</style>
</head>
<body>
<div id="root">
  <div id="widget" class="hidden"></div>
</div>
<script>
// MARK: - Config
const params = new URLSearchParams(location.search);
const wsPort = params.get('port') || params.get('wsPort') || '8765';
const autohide = Number(params.get('duration') || '0');
const hideAlbumArt = params.has('hideAlbumArt');

// MARK: - Font Resolution
function resolveFontFamily(name) {
  if (!name || name === 'System Default' || name === 'System') {
    return '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  }
  return '"' + name + '", sans-serif';
}

// MARK: - Theme Data
const themePresets = {
  'Default': {
    containerBg: 'transparent', containerBorder: 'none',
    containerShadow: '0 0 4px rgba(0,0,0,1)', containerRadius: '12px',
    backdropFilter: 'none', overlayBg: 'rgba(0,0,0,0.50)',
    textPrimary: '#FFFFFF', textSecondary: 'rgba(255,255,255,0.90)',
    textMuted: 'rgba(255,255,255,0.70)', textShadow: '2px 2px 2px rgb(0 0 0)',
    progressTrackBg: 'rgba(255,255,255,0.20)',
    progressFillBg: '#FFFFFF',
    showArtworkBlur: true,
  },
  'Dark': {
    containerBg: '#0D0D0D', containerBorder: '1px solid rgba(255,255,255,0.08)',
    containerShadow: '0 4px 12px rgba(0,0,0,0.6)', containerRadius: '12px',
    backdropFilter: 'none', overlayBg: 'transparent',
    textPrimary: '#E4E4E7', textSecondary: '#A1A1AA',
    textMuted: '#71717A', textShadow: 'none',
    progressTrackBg: 'rgba(255,255,255,0.08)', progressFillBg: '#A78BFA',
    showArtworkBlur: false,
  },
  'Light': {
    containerBg: 'rgba(255,255,255,0.92)', containerBorder: '1px solid rgba(0,0,0,0.08)',
    containerShadow: '0 4px 16px rgba(0,0,0,0.10)', containerRadius: '12px',
    backdropFilter: 'blur(16px)', overlayBg: 'transparent',
    textPrimary: '#18181B', textSecondary: '#3F3F46',
    textMuted: '#71717A', textShadow: 'none',
    progressTrackBg: 'rgba(0,0,0,0.08)', progressFillBg: '#3B82F6',
    showArtworkBlur: false,
  },
  'Glass': {
    containerBg: 'rgba(0,0,0,0.30)', containerBorder: '1px solid rgba(255,255,255,0.10)',
    containerShadow: '0 8px 32px rgba(0,0,0,0.20)', containerRadius: '16px',
    backdropFilter: 'blur(24px)', overlayBg: 'transparent',
    textPrimary: '#F5F5F7', textSecondary: 'rgba(245,245,247,0.80)',
    textMuted: 'rgba(245,245,247,0.50)', textShadow: 'none',
    progressTrackBg: 'rgba(255,255,255,0.10)', progressFillBg: '#007AFF',
    showArtworkBlur: false,
  },
  'Neon': {
    containerBg: 'rgba(10,10,30,0.85)', containerBorder: '1px solid #00FFAA',
    containerShadow: '0 0 20px rgba(0,255,170,0.30), 0 0 60px rgba(0,255,170,0.10)',
    containerRadius: '12px', backdropFilter: 'none', overlayBg: 'transparent',
    textPrimary: '#00FFAA', textSecondary: '#00E5FF',
    textMuted: 'rgba(0,255,170,0.50)', textShadow: '0 0 8px rgba(0,255,170,0.50)',
    progressTrackBg: 'rgba(0,255,170,0.15)', progressFillBg: 'linear-gradient(90deg, #00FFAA, #00E5FF)',
    showArtworkBlur: false,
  },
};

const layoutDimensions = {
  'Horizontal': { maxWidth: 500, height: 100 },
  'Vertical':   { maxWidth: 220, height: 280 },
  'Compact':    { maxWidth: 350, height: 56  },
};

// NOTE: Theme values (textColor, backgroundColor) are currently from hardcoded presets.
// If user-supplied custom values are added in the future, they must be sanitized
// before injection into style attributes to prevent CSS injection.
const defaultConfig = {
  theme: 'Default', layout: 'Horizontal',
  textColor: '#FFFFFF', backgroundColor: '#1A1A2E', fontFamily: 'System Default',
};

// MARK: - State
let nowPlaying = null;
let widgetConfig = Object.assign({}, defaultConfig);
let elapsed = 0;
let elapsedRef = { value: 0, timestamp: 0, isPlaying: false };
let visible = false;
let rafId = null;
let hideTimer = null;
let ws = null;
let reconnectTimer = null;
let reconnectAttempts = 0;
let hasReceivedTrack = false;

// MARK: - Helpers
function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return m + ':' + String(s).padStart(2, '0');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function resolveTheme(config) {
  const preset = themePresets[config.theme] || themePresets['Default'];
  const resolved = Object.assign({}, preset);
  resolved.fontFamily = resolveFontFamily(config.fontFamily);
  if (config.theme === 'Default' || config.theme === 'Glass') {
    if (config.textColor && config.textColor !== defaultConfig.textColor) {
      resolved.textPrimary = config.textColor;
      resolved.textSecondary = config.textColor;
      resolved.progressFillBg = config.textColor;
    }
    if (config.backgroundColor && config.backgroundColor !== defaultConfig.backgroundColor) {
      resolved.overlayBg = config.backgroundColor;
    }
  }
  return resolved;
}

// MARK: - Progress Loop
function startProgressLoop() {
  if (rafId) cancelAnimationFrame(rafId);
  function tick() {
    const ref = elapsedRef;
    if (ref.isPlaying && ref.timestamp > 0) {
      elapsed = ref.value + (Date.now() - ref.timestamp) / 1000;
    }
    updateProgress();
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

function stopProgressLoop() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

// MARK: - Visibility
function showWidget() {
  visible = true;
  const el = document.getElementById('widget');
  if (el) { el.classList.remove('hidden'); el.classList.add('visible'); }
  if (hideTimer) clearTimeout(hideTimer);
  if (autohide > 0) {
    hideTimer = setTimeout(function() { hideWidget(); }, autohide * 1000);
  }
}

function hideWidget() {
  visible = false;
  const el = document.getElementById('widget');
  if (el) { el.classList.remove('visible'); el.classList.add('hidden'); }
}

// MARK: - Render (progress updates only -- runs every RAF frame)
function updateProgress() {
  if (!nowPlaying) return;
  const duration = nowPlaying.duration || 0;
  const progress = duration > 0 ? Math.min((elapsed / duration) * 100, 100) : 0;
  const remaining = duration > 0 ? Math.max(duration - elapsed, 0) : 0;
  const fill = document.querySelector('.progress-fill');
  const elapsedEl = document.querySelector('.elapsed-time');
  const remainingEl = document.querySelector('.remaining-time');
  if (fill) fill.style.width = progress + '%';
  if (elapsedEl) elapsedEl.textContent = formatTime(elapsed);
  if (remainingEl) remainingEl.textContent = '-' + formatTime(remaining);
}

// MARK: - Render (full rebuild -- on track change or config change)
function buildWidget() {
  if (!nowPlaying) return;
  const el = document.getElementById('widget');
  if (!el) return;

  const theme = resolveTheme(widgetConfig);
  const layout = widgetConfig.layout || 'Horizontal';
  const dims = layoutDimensions[layout] || layoutDimensions['Horizontal'];
  const duration = nowPlaying.duration || 0;
  const progress = duration > 0 ? Math.min((elapsed / duration) * 100, 100) : 0;
  const remaining = duration > 0 ? Math.max(duration - elapsed, 0) : 0;

  // Container styles
  el.style.maxWidth = dims.maxWidth + 'px';
  el.style.height = dims.height + 'px';
  el.style.background = theme.containerBg;
  el.style.border = theme.containerBorder;
  el.style.boxShadow = theme.containerShadow;
  el.style.borderRadius = theme.containerRadius;
  el.style.backdropFilter = theme.backdropFilter;

  // Artwork HTML
  function artImg(w, h, radius) {
    var artURL = nowPlaying.artworkURL;
    if (artURL && !artURL.startsWith('http://') && !artURL.startsWith('https://')) {
      artURL = null;
    }
    if (!artURL) {
      return '<div class="flex items-center justify-center" style="width:' + w + 'px;height:' + h + 'px;border-radius:' + radius + ';background:rgba(255,255,255,0.10);">'
        + '<svg width="' + Math.round(w * 0.5) + '" height="' + Math.round(h * 0.5) + '" viewBox="0 0 24 24" fill="' + theme.textMuted + '">'
        + '<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>'
        + '</div>';
    }
    var safeURL = encodeURI(artURL).replace(/'/g, '%27').replace(/"/g, '%22');
    return '<img src="' + safeURL + '" crossorigin="anonymous" '
      + 'style="width:' + w + 'px;height:' + h + 'px;border-radius:' + radius + ';object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.3);">';
  }

  // Progress bar HTML
  const barH = layout === 'Vertical' ? '3px' : '4px';
  const timeSize = layout === 'Vertical' ? '9px' : '10px';
  const fillStyle = 'width:' + progress + '%;background:' + theme.progressFillBg + ';height:100%;border-radius:9999px;transition:width 1s linear;';
  const progressBar =
    '<div class="progress-track" style="background:' + theme.progressTrackBg + ';height:' + barH + ';">'
    + '<div class="progress-fill" style="' + fillStyle + '"></div>'
    + '</div>'
    + '<div class="time-row">'
    + '<span class="elapsed-time" style="color:' + theme.textMuted + ';font-family:' + theme.fontFamily + ';font-size:' + timeSize + ';">' + formatTime(elapsed) + '</span>'
    + '<span class="remaining-time" style="color:' + theme.textMuted + ';font-family:' + theme.fontFamily + ';font-size:' + timeSize + ';">-' + formatTime(remaining) + '</span>'
    + '</div>';

  // Blur / overlay / noise layers
  const validArtworkURL = nowPlaying.artworkURL && (nowPlaying.artworkURL.startsWith('http://') || nowPlaying.artworkURL.startsWith('https://'));
  const safeBlurURL = validArtworkURL ? encodeURI(nowPlaying.artworkURL).replace(/'/g, '%27').replace(/"/g, '%22').replace(/\)/g, '%29') : '';
  const blurLayer = (theme.showArtworkBlur && validArtworkURL)
    ? '<div class="blur-layer" style="background-image:url(' + safeBlurURL + ');"></div>'
    : '';
  const overlayLayer = (theme.overlayBg && theme.overlayBg !== 'transparent')
    ? '<div class="overlay-layer" style="background:' + theme.overlayBg + ';"></div>'
    : '';
  const noiseLayer = '<div class="noise-layer"></div>';

  // Layout HTML
  let layoutHTML = '';
  if (layout === 'Horizontal') {
    const art = hideAlbumArt ? '' : '<div style="flex-shrink:0;padding:5px;">' + artImg(90, 90, '10px') + '</div>';
    layoutHTML = '<div class="flex h-full">'
      + art
      + '<div style="display:flex;flex-direction:column;flex:1;min-width:0;justify-content:center;padding:8px 12px 8px 0;">'
      + '<div style="min-width:0;">'
      + '<p style="font-size:18px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:' + theme.textPrimary + ';text-shadow:' + theme.textShadow + ';font-family:' + theme.fontFamily + ';">' + escapeHtml(nowPlaying.track) + '</p>'
      + '<p style="font-size:13px;font-style:italic;font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:' + theme.textSecondary + ';text-shadow:' + theme.textShadow + ';font-family:' + theme.fontFamily + ';">' + escapeHtml(nowPlaying.artist) + '</p>'
      + '</div>'
      + '<div style="display:flex;align-items:center;margin-top:auto;gap:6px;">'
      + '<div style="flex:1;min-width:0;">' + progressBar + '</div>'
      + '</div>'
      + '</div>'
      + '</div>';
  } else if (layout === 'Vertical') {
    const art = hideAlbumArt ? '' : '<div class="shrink-0">' + artImg(200, 200, '10px') + '</div>';
    layoutHTML = '<div class="flex-col h-full items-center" style="padding:8px;">'
      + art
      + '<div style="display:flex;flex-direction:column;flex:1;min-width:0;width:100%;align-items:center;justify-content:center;margin-top:4px;">'
      + '<p style="font-size:13px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;color:' + theme.textPrimary + ';text-shadow:' + theme.textShadow + ';font-family:' + theme.fontFamily + ';">' + escapeHtml(nowPlaying.track) + '</p>'
      + '<p style="font-size:11px;font-style:italic;font-weight:300;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;color:' + theme.textSecondary + ';text-shadow:' + theme.textShadow + ';font-family:' + theme.fontFamily + ';">' + escapeHtml(nowPlaying.artist) + '</p>'
      + '</div>'
      + '<div style="width:100%;padding:0 4px;margin-top:auto;">' + progressBar + '</div>'
      + '</div>';
  } else { // Compact
    const art = hideAlbumArt ? '' : '<div style="flex-shrink:0;padding:5px;">' + artImg(46, 46, '8px') + '</div>';
    layoutHTML = '<div class="flex h-full items-center" style="padding:0 4px;">'
      + art
      + '<div style="flex:1;min-width:0;padding:0 8px;">'
      + '<p style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:' + theme.textPrimary + ';text-shadow:' + theme.textShadow + ';font-family:' + theme.fontFamily + ';">'
      + escapeHtml(nowPlaying.track)
      + '<span style="color:' + theme.textMuted + ';">&mdash;</span>'
      + '<span style="color:' + theme.textSecondary + ';">' + escapeHtml(nowPlaying.artist) + '</span>'
      + '</p>'
      + '</div>'
      + '</div>';
  }

  el.innerHTML = blurLayer + overlayLayer + noiseLayer + '<div class="relative h-full">' + layoutHTML + '</div>';
}

// MARK: - WebSocket
function connect() {
  if (ws) return;
  console.log('[WolfWave Widget] Connecting to ws://localhost:' + wsPort);
  ws = new WebSocket('ws://localhost:' + wsPort);

  ws.onopen = function() {
    console.log('[WolfWave Widget] Connected to ws://localhost:' + wsPort);
    reconnectAttempts = 0;
  };

  ws.onmessage = function(event) {
    try {
      handleMessage(JSON.parse(event.data));
    } catch(e) {
      console.warn('[WolfWave Widget] Failed to parse message:', e);
    }
  };

  ws.onclose = function() {
    ws = null;
    nowPlaying = null;
    hasReceivedTrack = false;
    stopProgressLoop();
    hideWidget();
    reconnectAttempts++;
    console.log('[WolfWave Widget] Disconnected — reconnect attempt ' + reconnectAttempts);
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 5000);
  };

  ws.onerror = function(e) {
    console.warn('[WolfWave Widget] WebSocket error:', e);
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'now_playing': {
      const data = msg.data;
      nowPlaying = data;
      elapsedRef = { value: data.elapsed, timestamp: Date.now(), isPlaying: data.isPlaying };
      elapsed = data.elapsed;
      hasReceivedTrack = true;
      buildWidget();
      if (data.isPlaying) {
        showWidget();
        startProgressLoop();
      }
      break;
    }
    case 'progress': {
      const data = msg.data;
      elapsedRef = { value: data.elapsed, timestamp: Date.now(), isPlaying: data.isPlaying };
      break;
    }
    case 'playback_state': {
      const data = msg.data;
      if (nowPlaying) Object.assign(nowPlaying, data);
      if (!data.isPlaying) {
        // Freeze elapsed at current computed value so resume doesn't jump
        elapsedRef = { value: elapsed, timestamp: Date.now(), isPlaying: false };
        stopProgressLoop();
        hideWidget();
      } else {
        // Reset timestamp on resume so elapsed counts from now
        elapsedRef = { value: elapsed, timestamp: Date.now(), isPlaying: true };
        showWidget();
        startProgressLoop();
      }
      break;
    }
    case 'widget_config': {
      widgetConfig = Object.assign({}, defaultConfig, msg.data);
      buildWidget();
      break;
    }
    case 'welcome':
      reconnectAttempts = 0;
      if (!hasReceivedTrack) {
        console.log('[WolfWave Widget] Connected, waiting for music...');
      }
      break;
  }
}

// MARK: - Init
connect();
</script>
</body>
</html>
