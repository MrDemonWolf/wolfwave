<body>
<!--
  #root is the centered viewport. The widget itself slides into the middle.
  We start `#widget` with the `placeholder` class so the OBS scene never
  flashes blank during the initial WebSocket handshake.
-->
<div id="root">
  <div id="widget" class="placeholder">Waiting for music&hellip;</div>
</div>
