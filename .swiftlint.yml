# SwiftLint configuration for WolfWave
#
# Lenient to start: size rules emit warnings (never errors) and the CI lint
# job is non-blocking. Tighten over time — eventually run with `--strict` and
# drop `continue-on-error` from the CI job.
#
# Run locally with `make lint` (requires `brew install swiftlint`).

included:
  - apps/native/wolfwave
  - apps/native/WolfWaveTests

excluded:
  # Generated by design-system/scripts/generate.ts — never hand-edited.
  - apps/native/wolfwave/Core/DesignSystem/Tokens.generated.swift

opt_in_rules:
  # CLAUDE.md: "No force unwrapping — use optionals and guard."
  - force_unwrapping

disabled_rules:
  # TODOs are tracked elsewhere; don't flag them while ramping up.
  - todo

# Size rules: warn generously, keep error thresholds high so they never block.
# WolfWave has a few large files (e.g. TwitchChatService) by design.
line_length:
  warning: 120
  error: 250
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 2500
  ignore_comment_only_lines: true

type_body_length:
  warning: 400
  error: 1500

function_body_length:
  warning: 80
  error: 400

reporter: "xcode"
